name: CI

# Gate for main: lint + tests must pass. Branch protection requires this check.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crm_agents_test
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Tests build their schema via create_all (see conftest); they just need a DB.
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crm_agents_test
      # async_session_factory (used by workers + audit_login_failure) points here.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/crm_agents_test
      DEBUG: "true"
      JWT_SECRET_KEY: ci-only-secret-not-for-production
      # A valid Fernet key so vault tests can encrypt/decrypt. CI-only, not a real secret.
      VAULT_ENCRYPTION_KEY: s31hlx3RMkKdt7xg9dBHuF6d5t8qUPD6E93DPzEUc20=
      LOG_FORMAT: json

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Run tests
        run: python -m pytest tests/ -q
